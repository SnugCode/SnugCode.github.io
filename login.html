<!DOCTYPE html>
<html lang="en" class="dashboard-document">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="SnugCode">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="SnugCode dashboard login">

    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/Logo/FavIconBlack32.png">

    <title>Login | SnugCode Dashboard</title>
</head>
<body>
    <a class="site-logo" href="index.html#intro" aria-label="SnugCode home">
        <img class="theme-logo" src="assets/Logo/LogoWhite.png" alt="SnugCode">
    </a>
    <button class="theme-toggle" type="button" aria-label="Switch to light mode" aria-pressed="true">
        <span class="theme-toggle-icon" aria-hidden="true">☾</span>
    </button>

    <main class="dashboard-page login-page">
        <section class="dashboard-panel login-panel">
            <p class="dashboard-kicker">Private workspace</p>
            <h1>Login</h1>
            <form id="login-form" class="dashboard-form login-form">
                <label>
                    Email
                    <input id="login-email" type="email" autocomplete="email" placeholder="you@example.com" required>
                </label>
                <label>
                    Password
                    <input id="login-password" type="password" autocomplete="current-password" required>
                </label>
                <button type="submit">Sign In</button>
            </form>
            <p id="login-status" class="dashboard-empty-copy">Sign in to access the dashboard.</p>
        </section>
    </main>

    <script type="module" src="js/login.js"></script>
</body>
</html>
